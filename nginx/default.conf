server {
    listen 80;

    root /usr/share/nginx/html;

    index index.html;

    charset utf-8;

    include /etc/nginx/snippets/headers.conf;

    # SPA entry points - never cache
    location ~ ^/(index\.html|config\.js|silent-check-sso\.html) {
        include /etc/nginx/snippets/headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Unhashed public assets (favicon, icons, logos) - cache for 1 day
    location ~ ^/(favicon\.ico|icons/|logo/) {
        include /etc/nginx/snippets/headers.conf;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        include /etc/nginx/snippets/headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
    location /l/ {
        include /etc/nginx/snippets/headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    location = /robots.txt {
        access_log off; log_not_found off;
    }

    access_log off;
    error_log off;

    location ~ /\.(?!well-known).* {
        deny all;
    }