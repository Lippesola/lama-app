server {
    listen 80;

    root /usr/share/nginx/html;

    index index.html;

    charset utf-8;

    include /etc/nginx/snippets/headers.conf;

    # Cache aggressively by default (1 year)
    location / {
        add_header Cache-Control "max-age=31536000, immutable";
        include /etc/nginx/snippets/headers.conf;
        try_files $uri /index.html;
    }

    # SPA entry point - never cache
    location /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        include /etc/nginx/snippets/headers.conf;
    }

    # Unhashed public assets - cache for 1 day
    location ~ ^/(favicon\.ico|icons/|logo/) {
        add_header Cache-Control "public, max-age=86400";
        include /etc/nginx/snippets/headers.conf;
    }

    # Unhashed config and html - never cache
    location ~ ^/(config\.js|silent-check-sso\.html) {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        include /etc/nginx/snippets/headers.conf;
    }

    location = /robots.txt {
        access_log off; log_not_found off;
    }

    access_log off;
    error_log off;

    location ~ /\.(?!well-known).* {
        deny all;
    }
}